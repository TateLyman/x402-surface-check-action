name: Bug report
description: Report a problem with the x402 Surface Check Action.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Do not include private keys, payment payloads, API keys, customer data, or secrets.
  - type: textarea
    id: workflow
    attributes:
      label: Workflow snippet
      description: Paste the relevant workflow step with secrets removed.
      render: yaml
    validations:
      required: true
  - type: input
    id: action-ref
    attributes:
      label: Action ref
      placeholder: TateLyman/x402-surface-check-action@v1
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
